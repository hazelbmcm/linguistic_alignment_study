<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Index.html</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style type="text/css">
    .likert ul
    {
        list-style-type: none;
        margin: 0;
        padding: 0;
    }

    .likert li
    {
        float: left;
        text-align: left;
        list-style-type: none;
    }
    </style>
</head>
<body>
    <div class="container mt-5" id="app"></div>
    <script>
        let state = "welcome"
        let participantID = null 
        let question_text = null
        let currentQuestionIndex = 0
        let currentQuestion = null
        let user_text = null
        let aiResponse = null
        let currentCondition = null
        let questionSummary = []
        let question_title = null

        function render(){
            const app = document.getElementById("app")
            

            if (state === "welcome") {
                app.innerHTML = `
                    <h1 class="mb-4">Welcome</h1>
                    <p class="mb-4">Press start to begin:</p>
                    <button class="btn btn-primary btn-lg" onclick="start()">Start</button>
                `
            }

            else if (state === "survey") {
                app.innerHTML = `
                    <h3 class="mb-3">Step One: Pre-Experiment Survey</h3>
                    <p>Please fill out the survey linked below</p>
                    <p>The first question asks for a participant ID, your participant ID is: <strong>${participantID}</strong></p>
                    <p>Once you have finished filling out the survey, press <strong>"Start Experiment"</strong> to begin!</p>
                    <br>
                    <a href="https://leidenuniv.eu.qualtrics.com/jfe/form/SV_78rQCwI1iQ71cPA" target="_blank">Start Survey</a>
                    <br><br>
                    <button class="btn btn-primary" onclick="instructions()">Start Experiment</button>
                `
            }

            else if (state === "instructions") {
                app.innerHTML = `
                    <h3 class="mb-3">Experiment Instructions</h3>
                    <p>In this experiment you will be asked to respond to 6 moral dilemmas. After reading each dilemma you will provide your initial reaction on a five point scale (strongly disagree, disagree, neutral, agree, strongly agree), and a short justification.</p>
                    <p>After your initial decision you will converse with an AI moral advisor who will respond to your justification and help you consider other perspectives. The two AI advisors you will interact with during the experiment are <strong>Star</strong> ⭐ and <strong>Sun</strong>☀️. Keep a mental note of who you are conversing with, as you will be asked questions about your experience with both AI’s after the experiment.</p>
                    <p>At any point in the conversation, you can choose to either respond to the AI’s statement or end the conversation. When  you choose to end the conversation, you will be asked to provide a final rating on the same five point scale, indicating how much you agree or disagree with the provided statement. This process repeats for all questions.</p>
                    <br><br>
                    <button class="btn btn-primary" onclick="question()">continue</button>
                `
            }

            else if (state === "question") {
                app.innerHTML = `
                <div class="card p-4 shadow-sm">
                    <h3 class="mb-3">Question ${currentQuestionIndex + 1} - ${question_title}</h3>
                    <p>${question_text}</p>


                    <div class="mt-4">
                    <p><strong>Your initial rating:</strong></p>
                    <div class="d-flex justify-content-between">
                        <span> Strongly Disagree </span>
                        <input type="radio" name="NO" value="1">
                        <input type="radio" name="NO" value="2">
                        <input type="radio" name="NO" value="3">
                        <input type="radio" name="NO" value="4">
                        <input type="radio" name="NO" value="5">
                        <span> Strongly Agree </span>
                    </div>  
                </div>
                
                <div class="mt-4">
                    <h5>Discussion</h5>
                    <p>Now you will discuss this dillema with AI agent ${currentCondition === "Aligned" ? "Star ⭐" : "Sun ☀️"}. Please first provide a 2 - 4 sentence justification for the answer you gave in the textbox below and click submit.</p> 
                    <p>Examples of things to include are:</p>
                    <ul>
                        <li>Why you chose your answer</li>
                        <li>Any tradeoffs you considered</li>
                        <li>What factors influenced your decision the most</li>
                    </ul>
                    <textarea id="userText" class=form-control mb-3 rows="4"></textarea>
                    <br>
                    <button class="btn btn-success" id="submitBtn" onclick="submitAnswer()">Submit</button>
                    </div>
                </div>
                `
            
            }
            else if (state === "response") {
               app.innerHTML = `
               <div class="card p-4 shadow-sm">
                <h3 class="mb-4">
                    Discussion with AI Agent
                    ${currentCondition === "Aligned" ? "Star⭐" : "Sun ☀️"}
                </h3>

                <div class="mb-3 p-3 bg-light rounded">
                <p><strong>User said:</strong><br> 
                    ${user_text}</p>
                </div>
                
                <div class="mb-3 p-3 bg-secondary text-white rounded">
                <p><strong>${currentCondition === "Aligned" ? "Star ⭐" : "Sun ☀️"} said: </strong>${aiResponse}</p>
                </div>

                <textarea id="userResponse" class="form-control mb-3" rows="3""></textarea>
                
                <button id="respondBtn" class="btn btn-outline-primary" onclick="continueConversation()">respond</button>
                <button class="btn btn-outline-danger" onclick="endConversation()">End conversation</button> 
            </div>
               `
            }
            else if (state === "end") {
                app.innerHTML = `
                <div class="card p-4 shadow-sm">
                    <h3 class="mb-3">Final Decision</h3>
                    <p>${question_text}</p>
                    
                    <div class="mt-4">
                        <p><strong>Your final rating</p>

                        <div class="d-flex justify-content-between">
                            <span>Strongly Disagree</span>
                            <input type="radio" name="final" value="1">
                            <input type="radio" name="final" value="2">
                            <input type="radio" name="final" value="3">
                            <input type="radio" name="final" value="4">
                            <input type="radio" name="final" value="5">
                            <span>Strongly Agree</span>
                        </div>
                    </div><br>     
                    <button class="btn btn-success"onclick="nextQuestion()">Submit</button>
                </div>    
                `
            }
            else if (state === "done") {
                const summaryHTML = questionSummary.map((q, index) => {
                    let agent
                    if (q.condition === "Aligned") {
                        agent = "Star ⭐"
                    }
                    else {
                        agent = "Sun ☀️"
                    }
                    return `<li>Question ${index + 1}: ${q.title} — ${agent}</li>`
                }).join("")

                app.innerHTML = `
                <h1>Experiment Summary</h1>
                <p>Before completing the post-experiment survey, please review which dilemmas you discussed and which AI advisor you spoke with.</p>
                <ul>
                    ${summaryHTML}
                </ul>

                <h1>Post Experiment Survey</h1>
                <p>Please fill out the survey linked below to complete the experiment</p>
                <p>When asked for your participant ID plase enter the following: <strong>${participantID}</strong></p>
                <p>Once you have finished filling out the survey, press <strong>"Finish Experiment"</strong> to finish the experiment!</p>
                <br><br>
                <a href="https://leidenuniv.eu.qualtrics.com/jfe/form/SV_5BDzTcTJIqFNY5E" target="_blank">Start Survey</a>
                <br><br>
                <button onclick="finished()">Finish Experiment</button>
                `
            }
            else if (state === "finalscreen") {
                app.innerHTML = `
                <h1>You are finished!</h1>
                <p>Thank you very much for participating in this experiment, your responses have been recorded and you are free to exit the site!</p>
                `
            }

        }

        function start() {
            fetch("/new-participant")
                .then(res => res.json())
                .then(data => {
                    participantID = data["participant_id"]
                    state = "survey"
                    render()
                })
                .catch(err => {
                    console.error(err)
                    alert("Something went wrong. Please try again")
                })
        }

        function instructions() {
            state = "instructions"
            render()
        }

        function question() {
        
            fetch(`/start-experiment/${participantID}`)
                .then(res => res.json())
                .then(data => {
                    console.log(data)
                    currentCondition = data["Condition"]
                    question_text = data["Text"]
                    question_title = data["Title"]

                    questionSummary.push({
                        title: data["Title"],
                        condition: data["Condition"]
                    })

                    state = "question"
                    render()
                })   
            
        }

        function submitAnswer() {
            const submitBtn = document.getElementById("submitBtn")
            submitBtn.disabled = true
            
            const selected = document.querySelector('input[name="NO"]:checked')
            const rating = selected ? parseInt(selected.value) : null
            const userText = document.getElementById("userText").value
            
            user_text = userText
            
            let words

            if (rating === null) {
                alert("Please select a rating.")
                submitBtn.disabled = false
                return
            }

            if (userText.trim() === "") {
                words = 0
            } else {
                words = userText.trim().split(/\s+/).length
            }

            if (words < 30) {
                alert("Please type at least 30 words.")
                submitBtn.disabled = false
                return
            }

            fetch("/submit-answer", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        participant_id: participantID,
                        question_index: currentQuestionIndex,
                        initial_rating: rating,
                        user_text: userText
                    })
            })
            .then(res => res.json())
            .then(data => {
                console.log(data)
                aiResponse = data["response"]
                state = "response"
                render()
            })
            .catch(err => {
                console.error(err)
                alert("Something went wrong. Try again.")
                submitBtn.disabled = false
            })
        }

        function continueConversation() {
            const respondBtn = document.getElementById("respondBtn")
            respondBtn.disabled = true
            const user_response = document.getElementById("userResponse").value
            user_text = user_response

            if (user_response.trim() === "") {
                alert("Please enter a response.")
                respondBtn.disabled = false
                return
            }

            fetch("/continue-conversation", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    participant_id: participantID,
                    question_index: currentQuestionIndex,
                    user_text: user_response

                })
            })
            .then(res => res.json())
            .then(data => {
                console.log(data)
                aiResponse = data["response"]
                state = "response"
                render()
            })
            .catch(err => {
                console.error(err)
                alert("Something went wrong. Try again.")
                respondBtn.disabled = false
            })
        }

        function endConversation() {
            state = "end"
            render()
        }

        function nextQuestion() {
            const final_selected = document.querySelector('input[name="final"]:checked')
            const final_rating = final_selected ? parseInt(final_selected.value) : null
            if (final_rating === null) {
                alert("Please select a rating.")
                return
            }
            fetch("/end-conversation", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    participant_id: participantID,
                    question_index: currentQuestionIndex,
                    final_rating: final_rating

                })
            })
            .then(res => res.json())
            .then(data => {
                console.log(data)
                if (data === "You are done!") {
                    state = "done"
                }
                else {
                    currentQuestionIndex += 1
                    question_text = data["Text"]
                    currentCondition = data["Condition"]
                    question_title = data["Title"]
                    
                    questionSummary.push({
                        title: data["Title"],
                        condition: data["Condition"]
                    })

                    user_text = null
                    aiResponse = null
                    state = "question"
                }

                render()
            })
            .catch(err => {
                console.error(err)
                alert("Something went wrong. Try again.")
            })
        
        }

        function finished() {
            state = "finalscreen"
            currentQuestionIndex = 0
            question_text = null
            user_text = null
            aiResponse = null
            currentCondition = null
            participantID = null
            render()
        }


        render()
    </script>
</body>
</html>
